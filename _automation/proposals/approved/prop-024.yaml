description: "Creare la guida fondamentali di Kustomize che al momento manca completamente.\n\
  La KB ha solo `avanzato.md` (JSON 6902 patch, KRM functions, Helm inflator) ma\n\
  nessuna introduzione ai concetti base. Un DevOps che inizia con Kustomize atterra\n\
  direttamente su materiale avanzato senza le fondamenta.\n\nStruttura suggerita:\n\
  - **Cos'è Kustomize e perché non è Helm**: differenza filosofica (no templating,\n\
  \  pure overlay), integrazione nativa kubectl (`kubectl apply -k`)\n- **Struttura\
  \ base**: `kustomization.yaml`, `resources`, `bases`\n- **Overlays**: `base/`, `overlays/dev/`,\
  \ `overlays/prod/` — il pattern standard\n- **Patches**: Strategic Merge Patch (la\
  \ più comune) vs JSON Patch (rimanda ad avanzato)\n- **ConfigMap e Secret generators**:\
  \ `configMapGenerator`, `secretGenerator`,\n  hash suffix per rolling update automatico\n\
  - **Trasformazioni comuni**: `namePrefix`, `nameSuffix`, `commonLabels`,\n  `commonAnnotations`,\
  \ `images` (override tag immagine senza toccare i manifest)\n- **Esempio completo**:\
  \ deploy di una app con 3 overlays (dev/staging/prod)\n  con diversi replicas, resource\
  \ limits, e image tag per ambiente\n```yaml\n# overlays/prod/kustomization.yaml\n\
  bases:\n  - ../../base\nnamePrefix: prod-\ncommonLabels:\n  env: production\nimages:\n\
  \  - name: myapp\n    newTag: v1.2.3\npatches:\n  - path: replicas-patch.yaml\n\
  ```\n- **Workflow CI/CD**: come usare `kustomize build | kubectl apply -f -` in\
  \ pipeline\n- **Troubleshooting**: errori comuni (`resource not found in base`,\
  \ loop di overlay)\n"
