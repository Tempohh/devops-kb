rationale: 'La KB ha un file `avanzato.md` ma nessun file `fondamentali.md` per Kustomize.

  Questo crea un percorso di apprendimento rotto: chi arriva per la prima volta

  al tool trova direttamente JSON 6902 patch e KRM functions — materiale da expert.

  Kustomize è integrato in kubectl da v1.14, è il default in molti cluster GitOps

  con ArgoCD e Flux, e la sua adozione cresce su quei cluster dove Helm è eccessivo.

  Un file fondamentali risolve il gap di entry-point e rende avanzato.md davvero utile.

  '
