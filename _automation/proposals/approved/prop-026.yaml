description: "Creare guida sulla scalabilità di Prometheus oltre il singolo nodo/cluster.\n\
  monitoring/tools/prometheus.md copre la configurazione base, ma non affronta\nil\
  \ problema reale di chi ha 10+ cluster o retention >15 giorni: Prometheus single\n\
  node non scala. I due approcci dominanti sono Thanos e VictoriaMetrics.\n\nStruttura\
  \ suggerita:\n- **Perché Prometheus da solo non basta**: limiti reali (RAM per alta\
  \ cardinality,\n  storage locale, no HA nativa, no query cross-cluster)\n- **Thanos**:\
  \ architettura a componenti (Sidecar, Query, Store, Compactor, Ruler)\n```\n[Prometheus\
  \ + Sidecar] → [Object Store: S3/GCS/Azure Blob]\n       ↑                     \
  \         ↑\n[Thanos Query] ← ← ← ← ← [Thanos Store Gateway]\n       ↓\n[Thanos\
  \ Compactor] (dedup + downsampling)\n```\n- **Installazione Thanos Sidecar** (pattern\
  \ più comune):\n```yaml\n# prometheus.yaml aggiunta\ncontainers:\n  - name: thanos-sidecar\n\
  \    image: quay.io/thanos/thanos:v0.36.0\n    args:\n      - sidecar\n      - --tsdb.path=/prometheus\n\
  \      - --prometheus.url=http://localhost:9090\n      - --objstore.config-file=/etc/thanos/objstore.yaml\n\
  ```\n- **VictoriaMetrics**: alternativa drop-in, singolo binario, 7-10x più efficiente\n\
  \  in storage rispetto a Prometheus, compatibile con PromQL e remote_write\n```bash\n\
  # Single-node VictoriaMetrics (replace Prometheus per cluster singolo)\ndocker run\
  \ -v /path/to/storage:/victoria-metrics-data \\\n  victoriametrics/victoria-metrics:v1.101.0\
  \ \\\n  -storageDataPath=/victoria-metrics-data \\\n  -retentionPeriod=1y   # retention\
  \ annuale senza problemi\n\n# Scrape config invariata rispetto a Prometheus\n# remote_write\
  \ da Prometheus a VictoriaMetrics\nremote_write:\n  - url: http://victoriametrics:8428/api/v1/write\n\
  ```\n- **Confronto Thanos vs VictoriaMetrics**: tabella (complessità, HA, multi-tenancy,\n\
  \  cardinality, compatibilità Grafana, licensing)\n- **VictoriaMetrics Cluster**:\
  \ per multi-tenant o volume estremo\n- **Grafana Mimir** (menzione): terza opzione\
  \ cloud-native di Grafana Labs\n- **Quando usare cosa**: decision tree basato su\
  \ numero cluster, retention, budget ops\n- **Remote write tuning**: come configurare\
  \ Prometheus per remote_write senza\n  perdere campioni sotto carico\n"
