rationale: 'monitoring/tools/prometheus.md non menziona scalabilità. Un SRE che ha
  bisogno

  di Prometheus su più cluster (microservizi federati, multi-AZ) o con retention

  lunga trova un gap completo nella KB. Thanos è lo standard de facto per Prometheus

  HA/multi-cluster (CNCF Incubating), VictoriaMetrics è l''alternativa più efficiente

  per chi non vuole la complessità Thanos. Entrambi sono usati massicciamente in

  produzione. Il file si collega a prometheus.md esistente e a monitoring/sre/

  per il contesto SRE.

  '
