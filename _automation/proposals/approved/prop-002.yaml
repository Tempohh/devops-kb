approved_at: '2026-03-29'
description: "AWS fondamentali e Azure fondamentali hanno entrambi 4 file core:\n\
  \  - billing-pricing / pricing\n  - global-infrastructure\n  - shared-responsibility\n\
  \  - well-architected\n\nGCP fondamentali ha solo:\n  - panoramica.md (esistente,\
  \ buona qualità)\n  - _index.md\n\nMancano 3 file che completerebbero la parità\
  \ con AWS/Azure:\n\n1. billing-pricing.md\n   - GCP pricing model: pay-as-you-go,\
  \ Sustained Use Discounts (SUD automatici),\n     Committed Use Discounts (CUD 1/3yr),\
  \ Spot/Preemptible VMs\n   - BigQuery pricing model (per query vs slot)\n   - Billing\
  \ Account structure, budget alerts, esportazione su BigQuery\n   - gcloud billing\
  \ commands, Billing API\n   - Confronto con AWS/Azure pricing equivalents\n\n2.\
  \ shared-responsibility.md\n   - Modello GCP: Google managed vs Customer managed\n\
  \   - Servizi IaaS vs PaaS vs SaaS in termini di responsabilità\n   - Compliance\
  \ certifications (ISO, SOC, PCI, GDPR)\n   - Google's infrastructure security vs\
  \ customer responsibility\n   - Confronto con AWS/Azure shared responsibility models\n\
  \n3. well-architected.md\n   - Google Cloud Architecture Framework (equivalente\
  \ a AWS Well-Architected)\n   - 6 pilastri: System Design, Operational Excellence,\
  \ Security, Reliability,\n     Cost Optimization, Performance\n   - Google Cloud\
  \ Architecture Center come reference\n   - Confronto con AWS WAF e Azure Well-Architected\
  \ Framework\n"
discovered_via: confronto strutturale AWS/Azure vs GCP
effort: large
id: prop-002
last_analyzed: 2026-03-29
priority: high
rationale: 'La mancanza di questi file crea un''asimmetria nella KB: chi impara AWS
  o Azure ha

  documenti fondamentali strutturati; chi impara GCP ha solo la panoramica generale.

  Questo è un gap di copertura significativo che ostacola l''uso della KB come guida

  di studio multi-cloud. Creando i 3 file si completa la simmetria della sezione cloud.

  '
