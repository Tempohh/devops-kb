rationale: 'security/runtime/ ha solo seccomp-apparmor.md — un file su prevenzione.

  Falco è il tool standard per il rilevamento runtime in Kubernetes, raccomandato

  da CNCF, CIS Kubernetes Benchmark e NSA Kubernetes Hardening Guide.

  Un security engineer che deve implementare runtime threat detection non trova

  nulla nella KB. Il gap è critico: seccomp/AppArmor e Falco sono complementari,

  non alternativi — entrambi servono in una postura di sicurezza matura.

  '
