utility_test:
  outcome: Dopo la lettura, installa NGINX Gateway Fabric, crea GatewayClass/Gateway
    gestiti dal team infra, e permette ai team applicativi di creare HTTPRoute autonomamente
    nel proprio namespace con traffic splitting nativo per canary release
  reader: Platform engineer che gestisce Kubernetes 1.28+ e sta configurando il routing
    HTTP per un cluster multi-team
  scenario: Deve permettere ai team applicativi di gestire le proprie regole di routing
    senza dare accesso a configurazioni di infrastruttura. Con Ingress non riesce
    a delegare in modo sicuro — ogni modifica richiede intervento del team platform
  score: medium
  without_kb: Dovrebbe leggere gateway-api.sigs.k8s.io (documentazione ampia), comparare
    controller (nginx vs istio vs traefik vs cilium), cercare esempi di migrazione
    da Ingress — almeno 4-5h per capire l'architettura e scegliere il controller
