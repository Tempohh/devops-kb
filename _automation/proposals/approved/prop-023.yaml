rationale: 'networking/kubernetes/ ha ingress.md ma non Gateway API, che è lo standard

  futuro ufficiale per il routing in Kubernetes (GA da 1.28, raccomandato da CNCF).

  Un Platform engineer che configura un nuovo cluster K8s nel 2025-2026 dovrebbe

  usare Gateway API invece di Ingress — ma la KB lo manda ancora verso l''approccio

  obsoleto. Il gap diventerà sempre più critico man mano che i controller

  (nginx, Traefik, Istio, Cilium) completano la deprecazione di Ingress.

  '
