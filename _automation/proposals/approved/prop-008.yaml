rationale: 'Le relazioni nella KB sono bidirezionali per convenzione (vedi CLAUDE.md
  Protocollo 3).

  Quando dev/ è stato creato, i backlink nei file esistenti non sono stati aggiunti
  perché

  farlo avrebbe richiesto la modifica di molti file contemporaneamente, violando il

  principio di costo O(1) per operazione. Questo backfill è ora necessario per rendere

  il grafo delle relazioni navigabile in entrambe le direzioni sulle connessioni più

  semanticamente significative. Sono stati scelti solo i 3 backlink a più alto valore

  (mTLS pratico, circuit breaker App/Mesh, DB pooling infra vs codice).

  '
