rationale: 'iac/terraform/ è la sezione IaC più ricca (fondamentali, state-management,
  moduli,

  testing) ma manca completamente il workflow collaborativo. Un team di 3+ DevOps

  che gestisce infrastruttura Terraform senza un processo CI/CD strutturato è

  un rischio operativo: apply manuali, nessun audit trail, stato inconsistente.

  Atlantis è lo strumento più diffuso per questo uso, e GitHub Actions è

  l''alternativa senza infrastruttura aggiuntiva. Questo file chiude il cerchio

  della sezione Terraform e la rende completa per un team reale.

  '
