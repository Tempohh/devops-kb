description: "Creare guida operativa per GCP Cloud Monitoring (ex Stackdriver) con\
  \ copertura\ndi metriche, logging, alerting e integrazione con workload GKE/Cloud\
  \ Run.\nAWS ha cloudwatch.md + observability.md; Azure ha monitor-log-analytics.md\
  \ +\napplication-insights.md. GCP non ha nulla — gap simmetrico bloccante.\n\n##\
  \ Cloud Monitoring — Metriche\n- Tipi di metriche: GCP system metrics (gce_instance,\
  \ k8s_container, cloud_run_revision)\n  vs custom metrics vs external metrics (Prometheus\
  \ via managed collection)\n- Workspaces: scope metrics da più progetti in un unico\
  \ workspace\n- Metric Explorer: query builder vs MQL (Monitoring Query Language)\n\
  - Managed Prometheus: raccolta Prometheus-native su GKE senza infra aggiuntiva\n\
  \  ```bash\n  gcloud container clusters update CLUSTER --enable-managed-prometheus\n\
  \  ```\n\n## Cloud Logging\n- Log Router: sink verso BigQuery, Cloud Storage, Pub/Sub\
  \ per retention a lungo termine\n- Log-based metrics: creare metriche custom da\
  \ pattern nei log\n  ```bash\n  gcloud logging metrics create http_500_errors \\\
  \n    --description=\"Count 500 errors\" \\\n    --log-filter='resource.type=\"\
  k8s_container\" severity=ERROR httpRequest.status=500'\n  ```\n- Log Explorer: query\
  \ con Logging Query Language (LQL)\n- _Required e _Default log bucket: retention,\
  \ costi, CMEK\n\n## Alerting Policy\n- Struttura: Condition + Notification Channel\
  \ + Documentation\n- Condition types: metric threshold, log-based metric, uptime\
  \ check, SLO\n- Notification channels: PagerDuty, Slack, email, Pub/Sub (per custom\
  \ webhook)\n- Alert fatigue: alignment period, duration, aggregation appropriati\n\
  ```bash\n# Creare alert via gcloud\ngcloud alpha monitoring policies create \\\n\
  \  --policy-from-file=alert-policy.json\n```\n- IaC: Terraform resource `google_monitoring_alert_policy`\n\
  \n## SLOs nativi GCP\n- Request-based SLO: good_total_ratio su Cloud Run/GKE\n-\
  \ Window-based SLO: disponibilità uptime check\n- Burn rate alert integrato (GCP\
  \ lo genera automaticamente dal SLO)\n- Dashboard SLO nativa in Cloud Monitoring\n\
  \n## GKE Observability\n- GKE System metrics: nodo, pod, container (auto-raccolta)\n\
  - Managed Service for Prometheus (MSP): zero-infra Prometheus su GKE\n- Application\
  \ Signals (preview): distributed tracing automatico con OTEL\n- Cloud Trace: tracing\
  \ distribuito, integrazione con Cloud Run e GKE\n\n## Integrazione con OTEL\n- OTEL\
  \ Collector → Google Cloud Exporter (metriche, trace, log)\n- `googlemanagedprometheus`\
  \ exporter per MSP\n- Confronto con approccio self-managed OTEL Collector KB esistente\n"
