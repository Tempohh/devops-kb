rationale: 'ci-cd/testing/test-strategy.md menziona i performance test nella piramide
  ma

  non li approfondisce — rimanda implicitamente a un file che non esiste.

  Un DevOps che deve aggiungere load testing alla pipeline CI trova la KB incompleta

  proprio dove ne avrebbe bisogno: esempi k6, thresholds configurabili, integrazione

  GitHub Actions. k6 è diventato il tool standard per questo uso (CNCF project,

  acquisito da Grafana Labs, CLI-first progettato per CI) e manca completamente

  dalla KB.

  '
