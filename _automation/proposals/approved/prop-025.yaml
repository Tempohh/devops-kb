rationale: 'Il cambio di licenza di Terraform (agosto 2023) è stato il singolo evento
  più

  controverso nell''ecosistema IaC degli ultimi anni. Molte organizzazioni hanno

  dovuto valutare la migrazione a OpenTofu per evitare vincoli legali BSL.

  La KB copre Terraform ma non menziona OpenTofu in nessun file — un DevOps che

  consulta la KB per decidere se migrare non trova nessuna guida. OpenTofu è già

  alla v1.8, GA stabile, usato in produzione da migliaia di organizzazioni.

  Il file può vivere in `docs/iac/terraform/` come argomento correlato piuttosto

  che in una cartella separata, per mantenerlo vicino ai file Terraform esistenti.

  '
