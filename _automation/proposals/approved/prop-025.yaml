description: "Creare guida su OpenTofu, il fork open-source di Terraform mantenuto\
  \ dalla\nLinux Foundation dopo il cambio di licenza di HashiCorp (agosto 2023: da\
  \ MPL 2.0\na Business Source License BSL 1.1).\n\nStruttura suggerita:\n- **Contesto\
  \ storico**: perché esiste OpenTofu — la controversia BSL, fork ufficiale\n  CNCF/Linux\
  \ Foundation (settembre 2023), GA v1.6 (gennaio 2024)\n- **Compatibilità**: OpenTofu\
  \ è drop-in replacement per Terraform fino a v1.5.x,\n  nessuna modifica ai `.tf`\
  \ esistenti per la migrazione base\n- **Differenze chiave rispetto a Terraform**:\n\
  \  - Provider registry: `registry.opentofu.org` invece di `registry.terraform.io`\n\
  \    (anche Terraform registry funziona, ma OpenTofu ha il proprio)\n  - State encryption\
  \ nativa (feature non presente in Terraform): protegge\n    lo state file con AES-GCM\
  \ o PBKDF2\n  - `provider_meta` esteso\n  - Loops e iterazioni più potenti (early\
  \ evaluation)\n- **Migrazione da Terraform**:\n```bash\n# Installa OpenTofu\nbrew\
  \ install opentofu   # macOS\n# oppure\nwget https://github.com/opentofu/opentofu/releases/download/v1.8.0/tofu_1.8.0_linux_amd64.zip\n\
  \n# Verifica compatibilità\ntofu version\n# Rimpiazza il binario terraform con tofu\
  \ (alias o PATH)\nalias terraform=tofu\n\n# Migrazione state: nessuna azione necessaria\
  \ per state locali\n# Per backend remoto: aggiorna terraform_backend se usi Terraform\
  \ Cloud\n# (OpenTofu supporta solo backend open: S3, GCS, Azure Blob, Consul, etc.)\n\
  ```\n- **State encryption** (feature esclusiva):\n```hcl\nterraform {\n  encryption\
  \ {\n    key_provider \"pbkdf2\" \"my_passphrase\" {\n      passphrase = var.state_passphrase\n\
  \    }\n    method \"aes_gcm\" \"my_method\" {\n      keys = key_provider.pbkdf2.my_passphrase\n\
  \    }\n    state {\n      method = method.aes_gcm.my_method\n      enforced = true\n\
  \    }\n  }\n}\n```\n- **Quando scegliere OpenTofu vs Terraform**: tabella decisionale\
  \ basata su\n  licensing constraints, Terraform Cloud dependency, compliance requirements\n\
  - **CI/CD con OpenTofu**: GitHub Actions (setup-opentofu action), GitLab CI\n- **Tooling\
  \ compatibile**: Atlantis, Terragrunt, Infracost — tutti supportano OpenTofu\n"
