rationale: 'GCP Cloud Storage è il servizio GCP più usato trasversalmente — quasi
  ogni

  workload su GCP lo usa in qualche forma (state Terraform, artifact storage,

  log export, dataset ML, backup). La sezione cloud/gcp è già underrepresented

  rispetto ad AWS/Azure, e manca proprio il servizio più fondamentale del layer

  storage. Il gap è particolarmente visibile per chi conosce AWS S3 e cerca

  l''equivalente GCP — la KB non ha risposta.

  '
