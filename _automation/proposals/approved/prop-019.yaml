description: "Creare guida operativa su REST API design e specifica OpenAPI 3.x.\n\
  dev/api/ ha solo _index.md senza nessun contenuto. √à una delle categorie\ndev/ pi√π\
  \ consultate in assoluto ‚Äî ogni backend developer progetta API REST.\n\n## Principi\
  \ REST ‚Äî vincoli architetturali\n- Stateless: ogni richiesta contiene tutta l'informazione\
  \ necessaria\n- Uniform Interface: URL come sostantivi, metodi HTTP come verbi\n\
  - Resource Representation: JSON come default, content negotiation con Accept header\n\
  - HATEOAS: link di navigazione nella risposta (opzionale ma utile per API discovery)\n\
  \n## URL Design ‚Äî convenzioni pratiche\n```\n# Corretti\nGET    /v1/orders     \
  \         # lista ordini\nPOST   /v1/orders              # crea ordine\nGET    /v1/orders/{id}\
  \         # ordine specifico\nPUT    /v1/orders/{id}         # replace completo\n\
  PATCH  /v1/orders/{id}         # update parziale\nDELETE /v1/orders/{id}       \
  \  # elimina ordine\n\n# Filtri, paginazione, sorting\nGET /v1/orders?status=pending&sort=-created_at&page=2&limit=20\n\
  \n# Sub-risorse\nGET /v1/orders/{id}/items      # items di un ordine\n```\n- Nouns,\
  \ not verbs: `/v1/orders` non `/v1/getOrders`\n- Plural: `/orders` non `/order`\n\
  - kebab-case per URL multi-parola: `/order-items` non `/orderItems`\n\n## HTTP Status\
  \ Codes ‚Äî uso corretto\n```\n200 OK            - GET/PUT/PATCH riuscito\n201 Created\
  \       - POST riuscito (con Location header)\n204 No Content    - DELETE riuscito,\
  \ nessun body\n400 Bad Request   - validazione fallita, body malformato\n401 Unauthorized\
  \  - non autenticato\n403 Forbidden     - autenticato ma non autorizzato\n404 Not\
  \ Found     - risorsa non esiste\n409 Conflict      - stato inconsistente (es. ordine\
  \ gi√Ý processato)\n422 Unprocessable - validazione semantica fallita\n429 Too Many\
  \ Requests - rate limiting\n500 Internal Server Error - bug server, non esporre\
  \ dettagli\n```\n\n## Versioning ‚Äî strategie\n```bash\n# URL versioning (pi√π comune,\
  \ esplicito)\n/v1/orders, /v2/orders\n\n# Header versioning (cleaner URL, meno visibile)\n\
  Accept: application/vnd.myapi.v2+json\n\n# Query parameter (deprecazione graduale)\n\
  /orders?api-version=2024-01-01\n```\n- Semantic versioning per breaking changes:\
  \ v1‚Üív2 solo se breaking\n- Deprecation header: `Deprecation: true`, `Sunset: Sat,\
  \ 31 Dec 2025 00:00:00 GMT`\n\n## Error Response ‚Äî formato standard\n```json\n{\n\
  \  \"type\": \"https://api.example.com/errors/validation-failed\",\n  \"title\"\
  : \"Validation Failed\",\n  \"status\": 400,\n  \"detail\": \"Il campo 'email' non\
  \ √® un indirizzo email valido\",\n  \"instance\": \"/v1/users/register\",\n  \"\
  errors\": [\n    {\"field\": \"email\", \"message\": \"formato non valido\"},\n\
  \    {\"field\": \"password\", \"message\": \"minimo 8 caratteri\"}\n  ]\n}\n```\n\
  - RFC 7807 Problem Details: standard per error response REST\n- Mai esporre stack\
  \ trace o dettagli interni in produzione\n\n## OpenAPI 3.x ‚Äî specifica pratica\n\
  ```yaml\nopenapi: 3.1.0\ninfo:\n  title: Orders API\n  version: 1.0.0\npaths:\n\
  \  /v1/orders:\n    get:\n      summary: Lista ordini\n      parameters:\n     \
  \   - name: status\n          in: query\n          schema:\n            type: string\n\
  \            enum: [pending, processing, completed]\n      responses:\n        '200':\n\
  \          content:\n            application/json:\n              schema:\n    \
  \            $ref: '#/components/schemas/OrderList'\n        '401':\n          $ref:\
  \ '#/components/responses/Unauthorized'\ncomponents:\n  schemas:\n    Order:\n \
  \     type: object\n      required: [id, status, total]\n      properties:\n   \
  \     id: {type: string, format: uuid}\n        status: {type: string, enum: [pending,\
  \ processing, completed]}\n        total: {type: number, format: decimal}\n```\n\
  - API-first: scrivere la spec prima del codice\n- Code generation: openapi-generator\
  \ per client SDK in 40+ linguaggi\n- Validation: schema validation automatica dal\
  \ spec (middleware)\n- Documentation: Swagger UI, Redoc, Scalar\n\n## Paginazione\
  \ ‚Äî pattern\n- Offset pagination: `page=2&limit=20` ‚Äî semplice, problemi con dataset\
  \ che cambiano\n- Cursor pagination: `after=eyJpZCI6MTIzfQ==` ‚Äî stabile, raccomandato\
  \ per feed real-time\n- Link header: `Link: </v1/orders?page=3>; rel=\"next\"` ‚Äî\
  \ standard HTTP\n"
