description: 'Il file docs/ci-cd/strategie/feature-flags.md non esiste ma è referenziato
  come

  argomento correlato in trunk-based-development.md. Feature flags è un argomento

  fondamentale nella KB CI/CD: trunk-based-development e deployment-strategies ne

  dipendono entrambi come meccanismo abilitante.


  Il file dovrebbe coprire:

  - Tipi di feature flag (release toggle, experiment toggle, ops toggle, permission
  toggle)

  - Lifecycle di un flag: creazione → attivazione → rimozione

  - Pattern di implementazione (LaunchDarkly, Unleash, Flipt, OpenFeature standard)

  - Branch by abstraction e combinazione con TBD

  - Feature flags per canary release / A-B testing

  - Rischi: flag debt, combinatorial explosion, stale flags

  - Tooling OpenFeature (standard CNCF)

  '
