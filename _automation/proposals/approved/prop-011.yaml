rationale: 'AWS ha `cloud/aws/messaging/sqs-sns.md` e `eventbridge-kinesis.md`.

  Azure ha `cloud/azure/messaging/service-bus-event-grid.md` e `event-hubs.md`.

  GCP non ha ancora nessun file di messaging. Cloud Pub/Sub è il servizio

  di messaggistica principale su GCP — qualsiasi architettura event-driven su GCP

  lo usa. Il confronto con SQS/SNS e Kafka è particolarmente utile per chi

  arriva da altri cloud.

  '
