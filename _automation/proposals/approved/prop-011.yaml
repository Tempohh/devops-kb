description: "Creare documentazione operativa su Cloud Pub/Sub come equivalente GCP\
  \ di SQS/SNS\ne Kafka per pattern di messaggistica asincrona. Struttura:\n\n## Panoramica\
  \ e Modello\n- Pub/Sub come managed messaging globale (multi-region by default)\n\
  - Topic, Subscription, Message: modello base\n- At-least-once delivery (default)\
  \ vs Exactly-once delivery (abilitabile)\n- Differenze chiave vs Kafka: no partizioni\
  \ esplicite, retention fissa, pull vs push\n\n## Subscription Types\n- Pull Subscription:\
  \ consumer chiede messaggi attivamente\n  - `gcloud pubsub subscriptions pull --limit=10\
  \ my-sub`\n  - StreamingPull per throughput alto (gRPC bidirezionale)\n- Push Subscription:\
  \ Pub/Sub chiama un endpoint HTTP/HTTPS\n  - Configurazione: push endpoint, auth\
  \ OIDC, retry policy\n  - Ideal per Cloud Run, Cloud Functions\n- BigQuery Subscription:\
  \ scrive direttamente su tabella BQ (no codice consumer)\n- Cloud Storage Subscription:\
  \ dump messaggi su bucket GCS\n\n## Configurazione Pratica\n- Creare topic: `gcloud\
  \ pubsub topics create my-topic`\n- Creare subscription: `gcloud pubsub subscriptions\
  \ create my-sub --topic=my-topic`\n- Dead Letter Topic (DLT): configura `--dead-letter-topic`\
  \ e `--max-delivery-attempts`\n- Message ordering: `--enable-message-ordering` e\
  \ ordering key\n- Retention: `--message-retention-duration` (default 7 giorni, max\
  \ 31)\n- Snapshot e seek: replay messaggi passati\n\n## IAM su Pub/Sub\n- Ruoli:\
  \ `roles/pubsub.publisher`, `roles/pubsub.subscriber`, `roles/pubsub.viewer`\n-\
  \ Principio minimo privilegio: publisher non può leggere, subscriber non può scrivere\n\
  - Workload Identity per publisher/subscriber da GKE\n\n## Pattern di Integrazione\n\
  - Pub/Sub → Cloud Run: trigger serverless su messaggi (equivalente SQS → Lambda)\n\
  - Pub/Sub → Dataflow: pipeline di trasformazione streaming\n- Pub/Sub → BQ: analytics\
  \ in near-realtime senza consumer custom\n- Fan-out: un topic, multiple subscription\
  \ per consumer diversi\n\n## Monitoring e Troubleshooting\n- Metriche chiave: `subscription/num_undelivered_messages`,\
  \ `subscription/oldest_unacked_message_age`\n- Alert su oldest_unacked_message_age\
  \ > soglia = consumer in ritardo\n- Subscription seek per re-processare messaggi\n\
  \n## Confronto con AWS/Azure\n| Feature | Pub/Sub | SQS | Kafka |\n|---------|---------|-----|-------|\n\
  | Retention | 31 giorni max | 14 giorni | Illimitata |\n| Partizioni | Automatiche\
  \ | N/A | Manuali |\n| Replay | Snapshot+seek | No | Offset |\n| Multi-region |\
  \ Default | Cross-region manual | Mirror Maker |\n"
