description: "Il file docs/security/supply-chain/sast-dast.md ha un broken link nel\
  \ campo related:\n\n```yaml\nrelated: [security/supply-chain/image-scanning, security/supply-chain/sbom-cosign,\n\
  \          security/supply-chain/admission-control, ci-cd/pipeline/github-actions]\n\
  ```\n\nIl path `ci-cd/pipeline/github-actions` non esiste. Nella KB ci sono:\n-\
  \ `ci-cd/pipeline` — questo è un FILE (docs/ci-cd/pipeline.md), non una directory\n\
  - `ci-cd/github-actions/workflow-avanzati` — il file GitHub Actions avanzato\n-\
  \ `ci-cd/github-actions/enterprise` — il file GitHub Actions enterprise\n\nIl riferimento\
  \ intendeva linkare GitHub Actions in quanto piattaforma CI dove si\nintegra SAST/DAST.\
  \ Il path corretto è `ci-cd/github-actions/workflow-avanzati`\n(che copre security\
  \ scanning steps) oppure `ci-cd/pipeline` (overview pipeline CI/CD).\n\nCorrezione\
  \ suggerita:\n```yaml\nrelated:\n  - security/supply-chain/image-scanning\n  - security/supply-chain/sbom-cosign\n\
  \  - security/supply-chain/admission-control\n  - ci-cd/github-actions/workflow-avanzati\
  \   # FIX: era ci-cd/pipeline/github-actions\n  - ci-cd/strategie/pipeline-security\
  \         # AGGIUNTA: argomento direttamente correlato\nlast_updated: 2026-03-29\n\
  ```\n\nNota: `ci-cd/strategie/pipeline-security` esiste ed è semanticamente più\
  \ rilevante\ndi GitHub Actions specifico, in quanto copre l'integrazione di security\
  \ nei pipeline\nindipendentemente dalla piattaforma CI.\n"
discovered_via: campionamento KB — campo related contiene path strutturalmente errato
