- id: '453'
  type: new_topic
  path: docs/ci-cd/testing/test-strategy.md
  category: ci-cd
  priority: P1
  status: completed
  reason: "Creare guida strategica per la test pyramid applicata a microservizi con\nintegrazione concreta nella pipeline\
    \ CI/CD. La KB ha contract-testing.md (Pact)\nma manca la mappa generale: quando usare ogni tipo di test, come strutturarli\n\
    nei job CI, e come bilanciare velocità vs copertura.\n\n## La Test Pyramid per microservizi\n- Layer 1 — Unit tests: logica\
    \ di business isolata, mock di dipendenze esterne\n  - Quando: per ogni funzione di business, algoritmo, validazione\n\
    \  - Target: >80% coverage, <1min di esecuzione totale\n- Layer 2 — Integration tests: DB reale, message broker reale\
    \ (Testcontainers)\n  - Quando: repository layer, Kafka consumer/producer, transazioni DB\n  - Tool: Testcontainers (Java/Go/Python),\
    \ embedded H2 solo per casi semplici\n- Layer 3 — Contract tests: verifica interfacce tra servizi (già coperto KB)\n-\
    \ Layer 4 — E2E tests: happy path critici, pochi e stabili\n  - Anti-pattern: E2E per tutto → lenti, fragili, difficili\
    \ da mantenere\n\n## Testcontainers — Integration testing pratico\n```java\n@Testcontainers\nclass OrderRepositoryTest\
    \ {\n    @Container\n    static PostgreSQLContainer<?> postgres = new PostgreSQLContainer<>(\"postgres:16\");\n\n    @Test\n\
    \    void shouldSaveOrder() {\n        // test con DB reale, nessun mock\n    }\n}\n```\n- Pattern: `@DynamicPropertySource`\
    \ per iniettare URL DB nel contesto Spring\n- Reuse container tra test della stessa suite: `withReuse(true)`\n- Testcontainers\
    \ Cloud per CI senza Docker-in-Docker\n\n## Struttura pipeline CI\n```yaml\n# GitHub Actions example\njobs:\n  unit-tests:\n\
    \    timeout-minutes: 5\n    # Solo JVM, nessun Docker\n  integration-tests:\n    timeout-minutes: 15\n    services:\n\
    \      postgres: {image: postgres:16}\n    # oppure Testcontainers\n  contract-tests:\n    needs: [integration-tests]\n\
    \    # Pact verify — ref a contract-testing.md\n  e2e-tests:\n    needs: [contract-tests]\n    if: github.ref == 'refs/heads/main'\n\
    \    # Solo su main, non su ogni PR\n```\n- Parallelizzazione: unit e integration in parallelo se indipendenti\n- Test\
    \ splitting: `--shard` in Jest, `--split-by=timing` in GitHub Actions\n- Fail fast: unit tests prima, E2E solo su main\n\
    \n## Mutation testing — misurare qualità dei test\n- Perché coverage % è fuorviante: codice coperto ≠ codice testato\n\
    - Tool: PIT (Java), mutmut (Python), go-mutesting (Go)\n- Mutation score target: >60% per critical paths\n\n## Anti-pattern\
    \ da evitare\n- Test dell'implementazione invece del comportamento (brittle tests)\n- Mock eccessivo: mock di tutto →\
    \ test che non trovano bug reali\n- Shared mutable state tra test: ordine di esecuzione non deterministico\n- Sleep/wait\
    \ fissi: usare Awaitility o polling con timeout\n- Test troppo grandi: un test deve testare una sola cosa\n"
  proposal_id: prop-017
- id: '454'
  type: new_topic
  path: docs/iac/pulumi/stacks-ambienti.md
  category: iac
  priority: P2
  status: completed
  reason: "Creare guida operativa per la gestione multi-ambiente con Pulumi: stacks,\nconfigurazione per ambiente, secrets,\
    \ state management, e integrazione CI/CD.\nfondamentali.md copre il concetto base ma non il workflow reale per team\n\
    che devono gestire dev/staging/prod in modo sicuro e riproducibile.\n\n## Stack e progetto Pulumi — architettura multi-ambiente\n\
    - Stack = istanza di deployment (dev, staging, prod)\n- `pulumi stack init organization/project/dev`\n- Stack reference:\
    \ leggere output di un altro stack (es. networking → app)\n```typescript\nconst networkStack = new pulumi.StackReference(\"\
    org/networking/prod\");\nconst vpcId = networkStack.getOutput(\"vpcId\");\n```\n- Struttura progetto consigliata: un Pulumi.yaml\
    \ per progetto, stack separati per ambiente\n\n## Configurazione per stack\n```bash\n# Configurazione non-secret\npulumi\
    \ config set aws:region eu-west-1 --stack prod\npulumi config set instanceType t3.medium --stack prod\npulumi config set\
    \ instanceType t3.micro --stack dev\n\n# Segreti cifrati nello stack state\npulumi config set --secret dbPassword s3cr3t\
    \ --stack prod\n```\n- `pulumi.Config()` nel codice: lettura type-safe della configurazione\n- Secrets providers: Pulumi\
    \ Cloud (default), AWS KMS, Azure Key Vault, HashiCorp Vault\n- Rotazione segreti: `pulumi config refresh` + `pulumi up`\n\
    \n## State management\n- Pulumi Cloud (SaaS): history, diffs, concurrency lock, team access\n- Self-managed: S3 bucket\
    \ + DynamoDB lock (simile Terraform)\n  ```bash\n  pulumi login s3://my-pulumi-state-bucket\n  ```\n- Migrazione state:\
    \ `pulumi stack export | pulumi stack import`\n- Stack locking: prevenire deploy concorrenti in CI\n\n## CI/CD Integration\n\
    ### GitHub Actions\n```yaml\n- uses: pulumi/actions@v5\n  with:\n    command: up\n    stack-name: org/project/prod\n \
    \   cloud-url: s3://pulumi-state\n  env:\n    PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}\n    AWS_ACCESS_KEY_ID:\
    \ ${{ secrets.AWS_ACCESS_KEY_ID }}\n```\n- Preview su PR: `command: preview` con commento automatico sul diff\n- Up su\
    \ merge in main: deploy automatico con approval gate\n- Pulumi Deployments (SaaS): trigger da Git, audit log, rollback\n\
    \n## Automation API — IaC programmatico\n- Eseguire Pulumi da codice Python/Go/TS senza CLI\n```python\nfrom pulumi.automation\
    \ import LocalWorkspace, UpOptions\n\nstack = LocalWorkspace.create_or_select_stack(\n    stack_name=\"dev\",\n    project_name=\"\
    myinfra\",\n    program=pulumi_program\n)\nresult = stack.up(on_output=print)\n```\n- Use case: provisioning self-service,\
    \ test infra (create→test→destroy)\n\n## Confronto con Terraform per team\n- Vantaggi Pulumi: linguaggio reale (loops,\
    \ conditionals nativi), type safety, testing\n- Quando preferire Terraform: team che conosce HCL, moduli pubblici Terraform\
    \ più maturi\n- Interoperabilità: `pulumi convert --from terraform` per migrare HCL esistente\n"
  proposal_id: prop-018
