- id: '446'
  type: new_topic
  path: docs/cloud/gcp/messaging/pubsub.md
  category: cloud
  priority: P1
  status: completed
  reason: "Creare documentazione operativa su Cloud Pub/Sub come equivalente GCP di SQS/SNS\ne Kafka per pattern di messaggistica\
    \ asincrona. Struttura:\n\n## Panoramica e Modello\n- Pub/Sub come managed messaging globale (multi-region by default)\n\
    - Topic, Subscription, Message: modello base\n- At-least-once delivery (default) vs Exactly-once delivery (abilitabile)\n\
    - Differenze chiave vs Kafka: no partizioni esplicite, retention fissa, pull vs push\n\n## Subscription Types\n- Pull\
    \ Subscription: consumer chiede messaggi attivamente\n  - `gcloud pubsub subscriptions pull --limit=10 my-sub`\n  - StreamingPull\
    \ per throughput alto (gRPC bidirezionale)\n- Push Subscription: Pub/Sub chiama un endpoint HTTP/HTTPS\n  - Configurazione:\
    \ push endpoint, auth OIDC, retry policy\n  - Ideal per Cloud Run, Cloud Functions\n- BigQuery Subscription: scrive direttamente\
    \ su tabella BQ (no codice consumer)\n- Cloud Storage Subscription: dump messaggi su bucket GCS\n\n## Configurazione Pratica\n\
    - Creare topic: `gcloud pubsub topics create my-topic`\n- Creare subscription: `gcloud pubsub subscriptions create my-sub\
    \ --topic=my-topic`\n- Dead Letter Topic (DLT): configura `--dead-letter-topic` e `--max-delivery-attempts`\n- Message\
    \ ordering: `--enable-message-ordering` e ordering key\n- Retention: `--message-retention-duration` (default 7 giorni,\
    \ max 31)\n- Snapshot e seek: replay messaggi passati\n\n## IAM su Pub/Sub\n- Ruoli: `roles/pubsub.publisher`, `roles/pubsub.subscriber`,\
    \ `roles/pubsub.viewer`\n- Principio minimo privilegio: publisher non può leggere, subscriber non può scrivere\n- Workload\
    \ Identity per publisher/subscriber da GKE\n\n## Pattern di Integrazione\n- Pub/Sub → Cloud Run: trigger serverless su\
    \ messaggi (equivalente SQS → Lambda)\n- Pub/Sub → Dataflow: pipeline di trasformazione streaming\n- Pub/Sub → BQ: analytics\
    \ in near-realtime senza consumer custom\n- Fan-out: un topic, multiple subscription per consumer diversi\n\n## Monitoring\
    \ e Troubleshooting\n- Metriche chiave: `subscription/num_undelivered_messages`, `subscription/oldest_unacked_message_age`\n\
    - Alert su oldest_unacked_message_age > soglia = consumer in ritardo\n- Subscription seek per re-processare messaggi\n\
    \n## Confronto con AWS/Azure\n| Feature | Pub/Sub | SQS | Kafka |\n|---------|---------|-----|-------|\n| Retention |\
    \ 31 giorni max | 14 giorni | Illimitata |\n| Partizioni | Automatiche | N/A | Manuali |\n| Replay | Snapshot+seek | No\
    \ | Offset |\n| Multi-region | Default | Cross-region manual | Mirror Maker |\n"
  proposal_id: prop-011
- id: '447'
  type: new_topic
  path: docs/monitoring/tools/otel-collector-kubernetes.md
  category: monitoring
  priority: P1
  status: completed
  reason: "Creare guida operativa per deployare e configurare OpenTelemetry Collector su\nKubernetes come infrastructure layer\
    \ per la pipeline di osservabilità\n(metrics → Prometheus, traces → Tempo/Jaeger, logs → Loki). La KB ha\nmonitoring/fondamentali/opentelemetry.md\
    \ (teoria) e dev/resilienza/observability-code.md\n(lato applicazione) ma manca il layer infrastrutturale.\n\n## Topologie\
    \ di deployment su K8s\n- DaemonSet: un collector per nodo (raccolta log da hostPath, metriche infra)\n- Deployment: collector\
    \ centralizzato (gateway per processing, batching, export)\n- Sidecar: collector per pod (use case: agenti legacy, isolamento\
    \ tenant)\n- Pattern raccomandato: DaemonSet (agent) + Deployment (gateway) per produzione\n\n## Operator vs Helm Chart\n\
    - OpenTelemetry Operator (cert-manager richiesto): auto-inject sidecar,\n  gestione CRD `OpenTelemetryCollector`, `Instrumentation`\n\
    - Helm chart `open-telemetry/opentelemetry-collector`: più semplice, meno funzionalità\n- Snippet: installazione Operator\
    \ via Helm + CR `OpenTelemetryCollector` base\n\n## Configurazione Collector: Receivers, Processors, Exporters\nStruttura\
    \ tipo config per il pattern DaemonSet + Gateway:\n\n```yaml\n# Agent DaemonSet\nreceivers:\n  otlp:           # riceve\
    \ da app via SDK\n    protocols: {grpc: {}, http: {}}\n  kubeletstats:   # metriche nodi K8s\n  filelog:        # log\
    \ dai container via /var/log/pods\n    include: [/var/log/pods/*/*/*.log]\nprocessors:\n  memory_limiter: {}\n  k8sattributes:\
    \  # arricchisce con namespace, pod, node\n  batch: {}\nexporters:\n  otlp/gateway:   # forwarda al gateway centralizzato\n\
    \    endpoint: otel-gateway:4317\n\n# Gateway Deployment\nreceivers:\n  otlp: {}\nprocessors:\n  batch:\n    send_batch_size:\
    \ 1000\n    timeout: 1s\n  resourcedetection: {}\nexporters:\n  prometheusremotewrite:\n    endpoint: http://prometheus:9090/api/v1/write\n\
    \  otlp/tempo:\n    endpoint: http://tempo:4317\n  loki:\n    endpoint: http://loki:3100/loki/api/v1/push\n```\n\n## K8s\
    \ Attributes Processor\n- Arricchire ogni segnale con `k8s.namespace.name`, `k8s.pod.name`,\n  `k8s.deployment.name`,\
    \ `k8s.node.name`\n- RBAC necessario: ClusterRole per list/watch pods/namespaces\n- ServiceAccount dedicato per il collector\n\
    \n## Auto-Instrumentation con Operator\n- CRD `Instrumentation` per linguaggio (Java, Python, Go, .NET, Node.js)\n- Annotation\
    \ sul namespace o deployment: `instrumentation.opentelemetry.io/inject-java: \"true\"`\n- Zero-code instrumentation per\
    \ app Spring Boot, FastAPI, etc.\n\n## Resource Sizing e Memory Limiter\n- `memory_limiter` obbligatorio: previene OOM\
    \ del collector\n- Regola: `limit_mib = container_memory_limit * 0.8`\n- DaemonSet: 100-200m CPU, 256-512Mi memory tipicamente\n\
    - Gateway: size in base al throughput (batch tuning)\n\n## Troubleshooting\n- `kubectl logs -l app=otel-collector -n monitoring`\n\
    - Endpoint diagnostici: `http://collector:55679/debug/tracez`\n- Metriche interne: `otelcol_receiver_accepted_spans`,\
    \ `otelcol_exporter_send_failed_metric_points`\n"
  proposal_id: prop-013
- id: '448'
  type: new_topic
  path: docs/messaging/rabbitmq/fondamentali.md
  category: messaging
  priority: P2
  status: skipped
  reason: "Creare documentazione operativa su RabbitMQ coprendo il modello AMQP, i pattern\ndi routing principali, e la gestione\
    \ in ambienti production. La sezione\nmessaging/rabbitmq esiste (solo _index.md) ma non ha contenuto reale.\n\n## Modello\
    \ AMQP: Exchange, Queue, Binding\n- Producer → Exchange → (Binding + Routing Key) → Queue → Consumer\n- Differenza concettuale\
    \ vs Kafka: RabbitMQ è push-based, Kafka è pull-based\n- Exchange types:\n  - Direct: routing key esatta (pattern request/reply,\
    \ task queues)\n  - Fanout: broadcast a tutte le queue legate (events, notifications)\n  - Topic: pattern con wildcard\
    \ `*` e `#` (routing flessibile)\n  - Headers: routing su headers AMQP (raro, performance peggiore)\n- Queue properties:\
    \ durable, auto-delete, exclusive, x-arguments\n\n## Pattern Operativi Fondamentali\n- Work Queue (Task Queue): distribuzione\
    \ round-robin tra consumer\n  - `basicQos(prefetchCount=1)` per fair dispatch\n- Publish/Subscribe: fanout exchange per\
    \ notifiche broadcast\n- Routing: direct/topic per instradamento selettivo\n- Dead Letter Queue (DLX): `x-dead-letter-exchange`,\
    \ `x-message-ttl`\n- Priority Queue: `x-max-priority` (1-255)\n\n## Configurazione Production\n- Quorum Queues vs Classic\
    \ Queues: sempre Quorum in produzione\n  - `\"x-queue-type\": \"quorum\"` — durabilità raft-based, no mirror\n- Clustering:\
    \ 3 nodi minimo, quorum majority\n- Policy per High Availability: `rabbitmqctl set_policy ha-all`\n- TLS: configurazione\
    \ `ssl_options` in rabbitmq.conf\n- vhost per isolamento multi-tenant\n- `rabbitmqctl list_queues name messages consumers`\n\
    \n## Consumer Best Practices\n- Manual ack vs auto-ack: sempre manual in produzione\n- `basic.ack` dopo processing, `basic.nack`\
    \ con requeue=false su errori permanenti\n- Consumer cancellation notification\n- Prefetch tuning: basso per task lunghi,\
    \ alto per task brevi\n- Idempotenza: i messaggi possono essere re-deliverd dopo crash\n\n## Monitoring\n- Management\
    \ UI: `http://localhost:15672` (plugin abilitato di default)\n- Metriche Prometheus: rabbitmq_exporter o prometheus plugin\
    \ nativo (>= 3.8)\n- Alert critici: `rabbitmq_queue_messages_ready` alto, consumer count = 0\n- Health check: `rabbitmq-diagnostics\
    \ check_running`\n\n## Confronto con Kafka\n| Aspetto | RabbitMQ | Kafka |\n|---------|----------|-------|\n| Modello\
    \ | Push (smart broker) | Pull (dumb broker) |\n| Retention | Messaggio eliminato dopo ack | Retention temporale/size\
    \ |\n| Replay | No (default) | Sì (offset) |\n| Throughput | Moderato (50k-100k msg/s) | Alto (>1M msg/s) |\n| Use case\
    \ | Task queue, routing complesso | Stream, event log, analytics |\n"
  proposal_id: prop-012
