- id: '444'
  type: new_topic
  path: docs/cloud/gcp/iam/iam-service-accounts.md
  category: cloud
  priority: P1
  status: completed
  reason: "Creare documentazione completa su GCP IAM focalizzata sugli scenari operativi più\nfrequenti in DevOps. Struttura\
    \ suggerita:\n\n## Concetti Chiave\n- Gerarchia IAM: Organization > Folder > Project > Resource\n- Differenza Service\
    \ Account vs User Account\n- Types of service accounts: user-managed, Google-managed, default SA\n- Principio del minimo\
    \ privilegio su GCP: IAM conditions, deny policies\n\n## Service Account operativi\n- Creazione SA con `gcloud iam service-accounts\
    \ create`\n- Assegnare ruoli: `gcloud projects add-iam-policy-binding`\n- SA Keys vs keyless authentication (preferenza\
    \ keyless)\n- Impersonation: `gcloud auth impersonate-service-account`\n\n## Workload Identity (GKE)\n- Binding tra K8s\
    \ ServiceAccount e GCP Service Account\n- Annotazione `iam.gke.io/gcp-service-account`\n- Setup passo-passo: abilita WIF\
    \ pool, binding, annotazione, test\n- Snippet YAML per PodSpec con SA annotato\n- Vantaggi vs SA key files: no key rotation,\
    \ auditabilità migliore\n\n## Organization Policies\n- Vincoli predefiniti più usati: `constraints/compute.requireShieldedVm`,\n\
    \  `constraints/iam.disableServiceAccountKeyCreation`\n- Custom org policies (GA dal 2024)\n- Policy inheritance e override\
    \ per folder/project\n\n## IAM Conditions\n- Accesso temporaneo con date conditions\n- Condition su resource attributes\
    \ (storage bucket prefix, etc.)\n\n## Best Practices & Anti-pattern\n- MAI usare il default Compute SA per applicazioni\n\
    - MAI creare SA keys se Workload Identity è disponibile\n- Auditare SA non usati con `gcloud asset search-all-iam-policies`\n"
  proposal_id: prop-009
- id: '445'
  type: new_topic
  path: docs/cloud/gcp/networking/vpc.md
  category: cloud
  priority: P1
  status: completed
  reason: "Creare documentazione operativa su GCP Networking coprendo VPC, subnet, Cloud NAT\ne load balancing — gli elementi\
    \ fondamentali per qualsiasi workload GCP. Struttura:\n\n## VPC su GCP — Differenze da AWS/Azure\n- VPC globale (non regionale\
    \ come AWS): le subnet sono regionali ma il VPC no\n- Shared VPC: centralizzare rete tra progetti (equivalente AWS RAM\
    \ / Azure peering)\n- VPC Peering vs Shared VPC: quando usare quale\n- Custom mode vs Auto mode: sempre custom mode in\
    \ produzione\n- Comandi: `gcloud compute networks create`, `gcloud compute networks subnets create`\n\n## Private Google\
    \ Access e Cloud NAT\n- Private Google Access: accesso a API Google senza IP pubblico\n- Cloud NAT: outbound internet\
    \ per VM senza IP pubblico\n  - Setup: `gcloud compute routers create` + `gcloud compute routers nats create`\n  - Log\
    \ NAT per troubleshooting\n- PSC (Private Service Connect): accesso privato a servizi GCP managed\n\n## Firewall Rules\n\
    - GCP firewall è distribuito (applicato a ogni VM, non al perimetro)\n- Priority, direction, target (service account vs\
    \ tag)\n- Best practice: prefer SA-based firewall rules vs tag-based\n- Firewall Policy vs Firewall Rules: differenze\
    \ e quando usare\n- `gcloud compute firewall-rules list --filter=\"network=my-vpc\"`\n\n## Load Balancing su GCP — Tassonomia\n\
    - Application LB (HTTP/S) — Global vs Regional\n- Network LB (TCP/UDP) — Pass-through\n- Internal Application LB — per\
    \ traffico interno GKE/servizi\n- NEG (Network Endpoint Group): integrazione con GKE, Cloud Run\n- Backend Service, Health\
    \ Check, URL Map: struttura logica ALB\n- Snippet YAML per Ingress GKE con GCE Ingress class\n\n## Troubleshooting\n-\
    \ VPC Flow Logs: abilitazione e analisi\n- Connectivity Tests: `gcloud network-connectivity tests create`\n- Firewall\
    \ Insights per regole non usate\n"
