- id: '450'
  type: new_topic
  path: docs/iac/ansible/roles-collections.md
  category: iac
  priority: P1
  status: completed
  reason: 'Creare guida operativa per strutturare un progetto Ansible enterprise con roles,

    collections, Galaxy e Vault. La KB ha già ansible/fondamentali.md (playbook base,

    inventory, handlers) ma manca completamente il layer di riutilizzo.


    ## Struttura di un role Ansible

    - Directory layout standard: tasks/, handlers/, templates/, files/, vars/, defaults/, meta/

    - Snippet `ansible-galaxy init myrole` con spiegazione di ogni cartella

    - Differenza tra vars/ (alta priorità, non override) vs defaults/ (bassa priorità, override-friendly)

    - Meta/main.yml: dependencies tra roles

    - Esempio completo: role "nginx" con template Jinja2 + handler reload


    ## Ansible Galaxy e Collections

    - Differenza role (singolo strumento) vs collection (namespace di roles + modules + plugins)

    - `ansible-galaxy role install geerlingguy.nginx`

    - `ansible-galaxy collection install community.postgresql`

    - requirements.yml: pinning versioni per riproducibilità

    - Private Automation Hub (Red Hat) vs Galaxy pubblico


    ## Ansible Vault — Gestione segreti

    - `ansible-vault encrypt_string` vs file vault

    - Vault password file vs vault-id multipli (prod/dev separati)

    - Integrazione con CI: ANSIBLE_VAULT_PASSWORD_FILE env var

    - Pattern sicuro: vault_password in variabile ambiente, mai in file committato


    ## Pattern enterprise

    - Struttura progetto multi-environment: inventories/production/, inventories/staging/

    - Group vars e host vars con override gerarchico

    - Dynamic inventory: script Python o plugin AWS/Azure/GCP

    - Tagging strategy: `ansible-playbook -t config` per eseguire solo task specifici

    - Idempotency check: `--check --diff` in CI prima del merge


    ## Testing roles con Molecule

    - `molecule init scenario` con driver Docker

    - Test file YAML: converge → idempotency check → verify

    - Pipeline CI per role: lint (ansible-lint) → molecule test

    '
  proposal_id: prop-014
- id: '451'
  type: new_topic
  path: docs/monitoring/alerting/prometheus-rules.md
  category: monitoring
  priority: P1
  status: completed
  reason: "Creare guida operativa per scrivere alert rules e recording rules Prometheus\ndi qualità production. La KB ha prometheus.md\
    \ (architettura, scraping, PromQL base)\ne alertmanager.md (routing, notifiche) ma manca il componente centrale:\ncome\
    \ scrivere regole di alerting efficaci.\n\n## Struttura di una alert rule\n```yaml\ngroups:\n  - name: app.rules\n   \
    \ interval: 30s    # override dello scrape interval per questo gruppo\n    rules:\n      - alert: HighErrorRate\n    \
    \    expr: |\n          rate(http_requests_total{status=~\"5..\"}[5m])\n          / rate(http_requests_total[5m]) > 0.05\n\
    \        for: 5m       # durata prima di firing (evita flap)\n        labels:\n          severity: critical\n        \
    \  team: backend\n        annotations:\n          summary: \"High error rate on {{ $labels.service }}\"\n          description:\
    \ \"Error rate is {{ $value | humanizePercentage }}\"\n          runbook_url: \"https://runbooks.company.com/high-error-rate\"\
    \n```\n- Campo `for`: perché è critico (evita alert per spike brevi)\n- Labels: severity (page/ticket/warning), team (per\
    \ routing Alertmanager)\n- Annotations: summary breve + description con valore, runbook_url obbligatorio\n\n## Recording\
    \ Rules — ottimizzazione PromQL\n- Quando usarle: espressioni costose usate in più alert/dashboard\n- Naming convention:\
    \ `level:metric:operation` (es. `job:http_requests:rate5m`)\n- Esempio pratico: pre-computare rate per 5 servizi riduce\
    \ carico di 5x\n```yaml\n- record: job:http_requests_total:rate5m\n  expr: rate(http_requests_total[5m])\n```\n\n## Alert\
    \ di qualità — criteri e anti-pattern\n- Anti-pattern: alert senza `for` (flapping), alert su metriche raw senza aggregazione\n\
    - Anti-pattern: severity:critical per tutto → alert fatigue\n- Pattern: USE method (Utilization, Saturation, Errors) per\
    \ infra\n- Pattern: RED method (Rate, Errors, Duration) per servizi\n- Pattern: SLO-based alerting (burn rate alerts)\
    \ collegato a monitoring/sre/slo-sla-sli.md\n\n## SLO-based burn rate alerts\n- Concetto: alert quando il budget di errori\
    \ si esaurisce troppo velocemente\n- Multi-window, multi-burn-rate: finestra lunga (1h) + finestra breve (5m)\n```yaml\n\
    - alert: SLOBudgetBurnHigh\n  expr: |\n    (job:http_errors:rate1h / job:http_requests:rate1h > 14.4 * 0.001)\n    and\n\
    \    (job:http_errors:rate5m / job:http_requests:rate5m > 14.4 * 0.001)\n  labels:\n    severity: critical\n```\n\n##\
    \ Organizzazione e tooling\n- `promtool check rules rules.yml` — validazione sintassi\n- `promtool test rules tests.yml`\
    \ — unit test per alert rules\n- Struttura file: un file per dominio (kubernetes.rules.yml, app.rules.yml)\n- Integrare\
    \ validazione in CI/CD prima del deploy\n"
  proposal_id: prop-015
