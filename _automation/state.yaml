- id: '456'
  type: new_topic
  path: docs/dev/api/rest-openapi.md
  category: dev
  priority: P1
  status: completed
  reason: "Creare guida operativa su REST API design e specifica OpenAPI 3.x.\ndev/api/ ha solo _index.md senza nessun contenuto.\
    \ È una delle categorie\ndev/ più consultate in assoluto — ogni backend developer progetta API REST.\n\n## Principi REST\
    \ — vincoli architetturali\n- Stateless: ogni richiesta contiene tutta l'informazione necessaria\n- Uniform Interface:\
    \ URL come sostantivi, metodi HTTP come verbi\n- Resource Representation: JSON come default, content negotiation con Accept\
    \ header\n- HATEOAS: link di navigazione nella risposta (opzionale ma utile per API discovery)\n\n## URL Design — convenzioni\
    \ pratiche\n```\n# Corretti\nGET    /v1/orders              # lista ordini\nPOST   /v1/orders              # crea ordine\n\
    GET    /v1/orders/{id}         # ordine specifico\nPUT    /v1/orders/{id}         # replace completo\nPATCH  /v1/orders/{id}\
    \         # update parziale\nDELETE /v1/orders/{id}         # elimina ordine\n\n# Filtri, paginazione, sorting\nGET /v1/orders?status=pending&sort=-created_at&page=2&limit=20\n\
    \n# Sub-risorse\nGET /v1/orders/{id}/items      # items di un ordine\n```\n- Nouns, not verbs: `/v1/orders` non `/v1/getOrders`\n\
    - Plural: `/orders` non `/order`\n- kebab-case per URL multi-parola: `/order-items` non `/orderItems`\n\n## HTTP Status\
    \ Codes — uso corretto\n```\n200 OK            - GET/PUT/PATCH riuscito\n201 Created       - POST riuscito (con Location\
    \ header)\n204 No Content    - DELETE riuscito, nessun body\n400 Bad Request   - validazione fallita, body malformato\n\
    401 Unauthorized  - non autenticato\n403 Forbidden     - autenticato ma non autorizzato\n404 Not Found     - risorsa non\
    \ esiste\n409 Conflict      - stato inconsistente (es. ordine già processato)\n422 Unprocessable - validazione semantica\
    \ fallita\n429 Too Many Requests - rate limiting\n500 Internal Server Error - bug server, non esporre dettagli\n```\n\n\
    ## Versioning — strategie\n```bash\n# URL versioning (più comune, esplicito)\n/v1/orders, /v2/orders\n\n# Header versioning\
    \ (cleaner URL, meno visibile)\nAccept: application/vnd.myapi.v2+json\n\n# Query parameter (deprecazione graduale)\n/orders?api-version=2024-01-01\n\
    ```\n- Semantic versioning per breaking changes: v1→v2 solo se breaking\n- Deprecation header: `Deprecation: true`, `Sunset:\
    \ Sat, 31 Dec 2025 00:00:00 GMT`\n\n## Error Response — formato standard\n```json\n{\n  \"type\": \"https://api.example.com/errors/validation-failed\"\
    ,\n  \"title\": \"Validation Failed\",\n  \"status\": 400,\n  \"detail\": \"Il campo 'email' non è un indirizzo email\
    \ valido\",\n  \"instance\": \"/v1/users/register\",\n  \"errors\": [\n    {\"field\": \"email\", \"message\": \"formato\
    \ non valido\"},\n    {\"field\": \"password\", \"message\": \"minimo 8 caratteri\"}\n  ]\n}\n```\n- RFC 7807 Problem\
    \ Details: standard per error response REST\n- Mai esporre stack trace o dettagli interni in produzione\n\n## OpenAPI\
    \ 3.x — specifica pratica\n```yaml\nopenapi: 3.1.0\ninfo:\n  title: Orders API\n  version: 1.0.0\npaths:\n  /v1/orders:\n\
    \    get:\n      summary: Lista ordini\n      parameters:\n        - name: status\n          in: query\n          schema:\n\
    \            type: string\n            enum: [pending, processing, completed]\n      responses:\n        '200':\n    \
    \      content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OrderList'\n\
    \        '401':\n          $ref: '#/components/responses/Unauthorized'\ncomponents:\n  schemas:\n    Order:\n      type:\
    \ object\n      required: [id, status, total]\n      properties:\n        id: {type: string, format: uuid}\n        status:\
    \ {type: string, enum: [pending, processing, completed]}\n        total: {type: number, format: decimal}\n```\n- API-first:\
    \ scrivere la spec prima del codice\n- Code generation: openapi-generator per client SDK in 40+ linguaggi\n- Validation:\
    \ schema validation automatica dal spec (middleware)\n- Documentation: Swagger UI, Redoc, Scalar\n\n## Paginazione — pattern\n\
    - Offset pagination: `page=2&limit=20` — semplice, problemi con dataset che cambiano\n- Cursor pagination: `after=eyJpZCI6MTIzfQ==`\
    \ — stabile, raccomandato per feed real-time\n- Link header: `Link: </v1/orders?page=3>; rel=\"next\"` — standard HTTP\n"
  proposal_id: prop-019
- id: '457'
  type: new_topic
  path: docs/security/runtime/falco.md
  category: security
  priority: P1
  status: completed
  reason: "Creare guida operativa su Falco per il rilevamento di minacce runtime in Kubernetes.\nsecurity/runtime/ ha solo\
    \ seccomp-apparmor.md. Falco è il tool open source\nstandard de facto per runtime threat detection nei cluster Kubernetes.\n\
    \n## Architettura Falco\n- Kernel driver (eBPF o kernel module) → System call capture\n- Falco engine: valuta rules sugli\
    \ eventi catturati in real-time\n- Falco Sidekick: fan-out degli alert verso SIEM, Slack, PagerDuty, Elasticsearch\n-\
    \ Deploy: DaemonSet (un pod per nodo) con privilegi kernel\n\n## Installazione via Helm\n```bash\nhelm repo add falcosecurity\
    \ https://falcosecurity.github.io/charts\nhelm install falco falcosecurity/falco \\\n  --namespace falco --create-namespace\
    \ \\\n  --set driver.kind=ebpf \\\n  --set falcosidekick.enabled=true \\\n  --set falcosidekick.config.slack.webhookurl=\"\
    https://hooks.slack.com/...\"\n```\n- `driver.kind=ebpf`: consigliato (no kernel module, nessuna compilazione)\n- Falco\
    \ Operator: alternativa CRD-based per gestione dichiarativa\n\n## Rules — struttura e custom rules\n```yaml\n- rule: Spawn\
    \ Shell in Container\n  desc: Un processo shell è stato avviato in un container\n  condition: >\n    container.id != host\
    \ and\n    proc.name in (shell_binaries) and\n    container.privileged = false\n  output: >\n    Shell in container (user=%user.name\
    \ container=%container.name\n    image=%container.image.repository:%container.image.tag\n    cmd=%proc.cmdline)\n  priority:\
    \ WARNING\n  tags: [container, shell, mitre_execution]\n```\n- Condition: espressione su campi Falco (proc.*, container.*,\
    \ fd.*, net.*)\n- Output: template per il messaggio dell'alert\n- Priority: EMERGENCY, ALERT, CRITICAL, ERROR, WARNING,\
    \ NOTICE, INFO, DEBUG\n- Override rules built-in: `override.condition`, `override.output`\n\n## Regole built-in più importanti\n\
    - `Terminal shell in container`: exec shell in running container\n- `Contact K8S API Server From Container`: accesso anomalo\
    \ all'API server\n- `Read sensitive file`: lettura /etc/shadow, /etc/passwd da processo non privilegiato\n- `Write below\
    \ root`: scrittura in / fuori dai path attesi\n- `Outbound connection to C2 servers`: comunicazione verso IP sospetti\
    \ (threat intel feed)\n\n## Falco Sidekick — output e integrazione SIEM\n```yaml\n# values.yaml Helm\nfalcosidekick:\n\
    \  config:\n    elasticsearch:\n      hostport: \"http://elasticsearch:9200\"\n      index: \"falco\"\n    slack:\n  \
    \    webhookurl: \"https://hooks.slack.com/...\"\n      minimumpriority: \"warning\"\n    pagerduty:\n      routingkey:\
    \ \"xxxxxxxx\"\n      minimumpriority: \"critical\"\n```\n- Filtering per priority: non inondare Slack con eventi NOTICE\n\
    - Custom webhook: integrazione con SIEM proprietario\n\n## Tuning e riduzione falsi positivi\n- Macro: definire condizioni\
    \ riutilizzabili (es. `trusted_containers`)\n- List: insiemi di valori (es. `shell_binaries: [bash, sh, zsh]`)\n- exceptions:\
    \ whitelist per rule specifiche senza disabilitarle\n```yaml\n- rule: Spawn Shell in Container\n  exceptions:\n    - name:\
    \ trusted_debug_containers\n      fields: [container.image.repository]\n      values: [[my-company/debug-tools]]\n```\n\
    \n## Confronto con seccomp/AppArmor\n- seccomp/AppArmor: prevenzione (blocca syscall/azioni prima che avvengano)\n- Falco:\
    \ detection (osserva e allerta DOPO che l'azione è avvenuta)\n- Pattern complementare: seccomp riduce la superficie, Falco\
    \ rileva il bypass\n"
  proposal_id: prop-020
- id: '458'
  type: new_topic
  path: docs/iac/terraform/ci-cd.md
  category: iac
  priority: P1
  status: completed
  reason: "Creare guida operativa per il workflow CI/CD con Terraform: PR-based plan/apply\ncon Atlantis, GitHub Actions,\
    \ e pattern di promozione tra ambienti.\niac/terraform/ ha fondamentali, state-management, moduli, testing — ma nessun\n\
    file su come strutturare il workflow CI/CD in team.\n\n## Il problema del Terraform collaborativo\n- `terraform apply`\
    \ manuale da locale: nessun audit, stato divergente, errori umani\n- Plan non rivisto: cambiamenti distruttivi (destroy)\
    \ passano inosservati\n- State lock contention: due ingegneri applicano in contemporanea\n- Soluzione: PR-based workflow\
    \ con plan automatico e apply protetto\n\n## Atlantis — Piano su PR, Apply su Merge\n```yaml\n# atlantis.yaml — configurazione\
    \ per repo multi-workspace\nversion: 3\nprojects:\n  - name: networking-prod\n    dir: infra/networking\n    workspace:\
    \ prod\n    autoplan:\n      when_modified: [\"*.tf\", \"../modules/**/*.tf\"]\n      enabled: true\n    apply_requirements:\
    \ [approved, mergeable]\n```\n- `autoplan`: Atlantis commenta il plan su ogni PR che tocca file .tf\n- `apply_requirements`:\
    \ apply solo dopo approvazione review + PR mergeable\n- Workflow: push → plan automatico → commento PR → revisione → `/atlantis\
    \ apply`\n- Self-hosted su Kubernetes: Helm chart `runatlantis/atlantis`\n\n## GitHub Actions — Plan su PR, Apply su Main\n\
    ```yaml\njobs:\n  plan:\n    if: github.event_name == 'pull_request'\n    steps:\n      - uses: hashicorp/setup-terraform@v3\n\
    \      - run: terraform init -backend-config=backend-prod.hcl\n      - id: plan\n        run: terraform plan -out=tfplan\
    \ -no-color\n        continue-on-error: true\n      - uses: actions/github-script@v7\n        with:\n          script:\
    \ |\n            const output = `#### Terraform Plan \U0001F4D6\n            \\`\\`\\`\\n${{ steps.plan.outputs.stdout\
    \ }}\\`\\`\\``;\n            github.rest.issues.createComment({\n              issue_number: context.issue.number,\n \
    \             body: output\n            })\n\n  apply:\n    if: github.ref == 'refs/heads/main' && github.event_name ==\
    \ 'push'\n    environment: production  # richiede approval manuale in GitHub\n    steps:\n      - run: terraform apply\
    \ -auto-approve tfplan\n```\n- `environment: production`: protezione nativa GitHub con required reviewers\n- Plan artifact:\
    \ passare `tfplan` da job plan a job apply (stessa versione)\n\n## Pattern multi-ambiente con workspace\n```bash\n# Promozione\
    \ dev → staging → prod\nterraform workspace select dev && terraform plan -var-file=dev.tfvars\nterraform workspace select\
    \ staging && terraform plan -var-file=staging.tfvars\n# Apply staging solo dopo test su dev\nterraform workspace select\
    \ prod && terraform apply -var-file=prod.tfvars\n```\n- Alternativa: directory separate per ambiente (più esplicito, meno\
    \ errori)\n- Terragrunt `run-all`: orchestrare plan/apply su più moduli con dipendenze\n\n## Drift detection automatica\n\
    ```yaml\n# Scheduled job GitHub Actions — rilevare drift\nschedule:\n  - cron: '0 8 * * 1-5'  # ogni giorno lavorativo\
    \ alle 8:00\njobs:\n  drift-detection:\n    steps:\n      - run: terraform plan -detailed-exitcode\n        # exit code\
    \ 2 = drift rilevato\n      - name: Alert on drift\n        if: steps.plan.outputs.exitcode == '2'\n        run: |\n \
    \         curl -X POST $SLACK_WEBHOOK -d '{\"text\":\"⚠️ Terraform drift detected in prod!\"}'\n```\n\n## Security nel\
    \ CI/CD Terraform\n- OIDC per AWS/Azure/GCP: no long-lived credentials nel CI\n- Checkov / tfsec: static analysis nel\
    \ plan job (blocca risorse non conformi)\n- Sentinel (Terraform Cloud): policy as code per bloccare apply non conformi\n\
    - Least privilege: service account CI con solo permessi necessari per l'ambiente\n"
  proposal_id: prop-021
- id: '459'
  type: new_topic
  path: docs/cloud/finops/kubernetes-cost.md
  category: cloud
  priority: P2
  status: completed
  reason: "Creare guida operativa su cost visibility e chargeback per Kubernetes con\nKubecost e OpenCost. cloud/finops/ ha\
    \ solo fondamentali.md — nessun file\nsu come misurare e allocare i costi in ambienti Kubernetes multi-team.\n\n## Il\
    \ problema del costo Kubernetes\n- Cloud bill aggregata: impossibile sapere quale team/namespace costa cosa\n- CPU e memoria\
    \ condivisi: costi proporzionali all'utilizzo reale vs richiesto\n- Costi nascosti: egress, persistent volumes, load balancer\
    \ per namespace\n- Obiettivo FinOps: cost allocation per team → chargeback / showback\n\n## OpenCost — standard CNCF open\
    \ source\n```bash\n# Installazione OpenCost (CNCF Sandbox project)\nhelm repo add opencost https://opencost.github.io/opencost-helm-chart\n\
    helm install opencost opencost/opencost \\\n  --namespace opencost --create-namespace \\\n  --set opencost.exporter.cloudProviderApiKey=\"\
    ...\"\n```\n- Espone metriche Prometheus: `container_cpu_allocation`, `container_memory_allocation`\n- API REST: query\
    \ costi per namespace/label/deployment/pod su finestra temporale\n```bash\ncurl \"http://opencost:9003/allocation?window=7d&aggregate=namespace&accumulate=false\"\
    \n```\n- Integrazione Grafana: dashboard pre-built su grafana.com/grafana/dashboards\n\n## Kubecost — funzionalità enterprise\n\
    ```bash\nhelm install cost-analyzer kubecost/cost-analyzer \\\n  --namespace kubecost --create-namespace \\\n  --set global.prometheus.enabled=false\
    \ \\\n  --set global.prometheus.fqdn=\"http://prometheus:9090\"\n```\n- Cost Allocation: costo per namespace, label, controller,\
    \ pod con granularità oraria\n- Savings Insights: rightsizing raccomandazioni (CPU/Memory request over-provisioned)\n\
    - Anomaly detection: spike di costo automaticamente rilevati\n- Budget alerts: notifica quando namespace supera budget\
    \ mensile\n\n## Cost Allocation per team — chargeback pratico\n```yaml\n# Kubecost — configurazione allocation by label\n\
    # Ogni team etichetta i propri workload\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  labels:\n    team: payments\n\
    \    cost-center: CC-1234\n    environment: prod\n```\n- Report settimanale: costo per `team` label → inviato via Slack/email\
    \ al team lead\n- Showback: visibilità senza addebitare (cultura first, poi chargeback)\n- Chargeback: integrazione con\
    \ sistema di billing interno via API Kubecost\n\n## Ottimizzazione — rightsizing raccomandazioni\n- Request vs actual:\
    \ Kubecost confronta `resources.requests` con utilizzo P95\n- Over-provisioned: CPU request 4 core, utilizzo P95 0.5 core\
    \ → suggerisce 0.7 core\n- Under-provisioned: container OOMKilled → aumentare memory limit\n```bash\n# Kubecost API —\
    \ raccomandazioni rightsizing\ncurl \"http://kubecost:9090/savings/requestSizing?window=7d&targetUtilization=0.8\"\n```\n\
    \n## Integrazione con FinOps fondamentali\n- Unit economics: costo per richiesta API = (costo namespace / numero richieste)\n\
    - Benchmark tra ambienti: costo staging vs prod (staging non deve costare come prod)\n- Cloud provider discount: OpenCost\
    \ integra AWS Spot pricing, Reserved Instance savings\n"
  proposal_id: prop-022
- id: '460'
  type: new_topic
  path: docs/networking/kubernetes/gateway-api.md
  category: networking
  priority: P2
  status: completed
  reason: "Creare guida operativa su Kubernetes Gateway API (GA da K8s 1.28+).\nnetworking/kubernetes/ ha cni.md, ingress.md,\
    \ network-policies.md — ma non\ncopre Gateway API, che è il successore ufficiale di Ingress con feature\navanzate e model\
    \ role-based. Molti team stanno già migrando.\n\n## Perché Gateway API sostituisce Ingress\n- Ingress limiti: un solo\
    \ spec per tutti i casi (HTTP base), annotations vendor-specific\n- Gateway API: types separati per ruoli diversi, role-based\
    \ (infra team vs app team)\n- Status: GA (stable) per core features in K8s 1.28, supporto in Istio/Traefik/nginx/Cilium\n\
    \n## Tre risorse chiave\n```\nGatewayClass → Gateway → HTTPRoute/TCPRoute/GRPCRoute\n```\n- **GatewayClass**: definisce\
    \ il controller (nginx, istio, traefik, cilium) — gestita da infra team\n- **Gateway**: istanza di listener (porta, protocollo,\
    \ TLS) — gestita da platform team\n- **HTTPRoute**: regole di routing per applicazioni — gestita da app team\n\n## Esempio\
    \ completo NGINX Gateway Fabric\n```bash\n# Installazione NGINX Gateway Fabric\nkubectl apply -f https://github.com/nginxinc/nginx-gateway-fabric/releases/download/v1.4.0/crds.yaml\n\
    helm install ngf oci://ghcr.io/nginxinc/charts/nginx-gateway-fabric \\\n  --namespace nginx-gateway --create-namespace\n\
    ```\n\n```yaml\n# GatewayClass (infra team — una volta sola)\napiVersion: gateway.networking.k8s.io/v1\nkind: GatewayClass\n\
    metadata:\n  name: nginx\nspec:\n  controllerName: gateway.nginx.org/nginx-gateway-controller\n\n# Gateway (platform team\
    \ — per ambiente/namespace)\napiVersion: gateway.networking.k8s.io/v1\nkind: Gateway\nmetadata:\n  name: prod-gateway\n\
    \  namespace: infra\nspec:\n  gatewayClassName: nginx\n  listeners:\n    - name: https\n      port: 443\n      protocol:\
    \ HTTPS\n      tls:\n        mode: Terminate\n        certificateRefs:\n          - name: wildcard-cert\n            namespace:\
    \ infra\n      allowedRoutes:\n        namespaces:\n          from: Selector\n          selector:\n            matchLabels:\n\
    \              gateway-access: \"true\"\n\n# HTTPRoute (app team — nel namespace dell'applicazione)\napiVersion: gateway.networking.k8s.io/v1\n\
    kind: HTTPRoute\nmetadata:\n  name: orders-route\n  namespace: orders\nspec:\n  parentRefs:\n    - name: prod-gateway\n\
    \      namespace: infra\n  hostnames:\n    - \"orders.example.com\"\n  rules:\n    - matches:\n        - path:\n     \
    \       type: PathPrefix\n            value: /api/v1\n      backendRefs:\n        - name: orders-service\n          port:\
    \ 8080\n          weight: 100\n```\n\n## Traffic management avanzato\n```yaml\n# Canary release: 10% traffico su v2\n\
    rules:\n  - backendRefs:\n      - name: orders-v1\n        port: 8080\n        weight: 90\n      - name: orders-v2\n \
    \       port: 8080\n        weight: 10\n\n# Header-based routing: route per team di test\n- matches:\n    - headers:\n\
    \        - name: X-Canary\n          value: \"true\"\n  backendRefs:\n    - name: orders-v2\n      port: 8080\n```\n\n\
    ## Confronto con Ingress\n| Feature | Ingress | Gateway API |\n|---------|---------|-------------|\n| TLS passthrough\
    \ | annotation vendor | `TLSRoute` nativo |\n| Traffic splitting | annotation nginx | spec nativo `weight` |\n| Header\
    \ routing | annotation nginx | spec nativo |\n| Role-based management | monolitico | GatewayClass/Gateway/Route separati\
    \ |\n| TCP/UDP routing | non supportato | `TCPRoute`/`UDPRoute` |\n| gRPC | non supportato | `GRPCRoute` nativo |\n\n\
    ## Migrazione da Ingress esistente\n```bash\n# Tool di migrazione automatica\nkubectl-gateway-api-migrate --from-ingress\
    \ --namespace production\n# Genera HTTPRoute equivalenti agli Ingress esistenti\n```\n- Migrazione graduale: Gateway API\
    \ e Ingress coesistono sullo stesso cluster\n- Supporto controller: nginx-ingress, Traefik v3, Istio, Cilium supportano\
    \ entrambi\n"
  proposal_id: prop-023
