- id: '462'
  type: new_topic
  path: docs/containers/kustomize/fondamentali.md
  category: containers
  priority: P1
  status: completed
  reason: "Creare la guida fondamentali di Kustomize che al momento manca completamente.\nLa KB ha solo `avanzato.md` (JSON\
    \ 6902 patch, KRM functions, Helm inflator) ma\nnessuna introduzione ai concetti base. Un DevOps che inizia con Kustomize\
    \ atterra\ndirettamente su materiale avanzato senza le fondamenta.\n\nStruttura suggerita:\n- **Cos'è Kustomize e perché\
    \ non è Helm**: differenza filosofica (no templating,\n  pure overlay), integrazione nativa kubectl (`kubectl apply -k`)\n\
    - **Struttura base**: `kustomization.yaml`, `resources`, `bases`\n- **Overlays**: `base/`, `overlays/dev/`, `overlays/prod/`\
    \ — il pattern standard\n- **Patches**: Strategic Merge Patch (la più comune) vs JSON Patch (rimanda ad avanzato)\n- **ConfigMap\
    \ e Secret generators**: `configMapGenerator`, `secretGenerator`,\n  hash suffix per rolling update automatico\n- **Trasformazioni\
    \ comuni**: `namePrefix`, `nameSuffix`, `commonLabels`,\n  `commonAnnotations`, `images` (override tag immagine senza\
    \ toccare i manifest)\n- **Esempio completo**: deploy di una app con 3 overlays (dev/staging/prod)\n  con diversi replicas,\
    \ resource limits, e image tag per ambiente\n```yaml\n# overlays/prod/kustomization.yaml\nbases:\n  - ../../base\nnamePrefix:\
    \ prod-\ncommonLabels:\n  env: production\nimages:\n  - name: myapp\n    newTag: v1.2.3\npatches:\n  - path: replicas-patch.yaml\n\
    ```\n- **Workflow CI/CD**: come usare `kustomize build | kubectl apply -f -` in pipeline\n- **Troubleshooting**: errori\
    \ comuni (`resource not found in base`, loop di overlay)\n"
  proposal_id: prop-024
- id: '463'
  type: new_topic
  path: docs/iac/terraform/opentofu.md
  category: iac
  priority: P1
  status: completed
  reason: "Creare guida su OpenTofu, il fork open-source di Terraform mantenuto dalla\nLinux Foundation dopo il cambio di\
    \ licenza di HashiCorp (agosto 2023: da MPL 2.0\na Business Source License BSL 1.1).\n\nStruttura suggerita:\n- **Contesto\
    \ storico**: perché esiste OpenTofu — la controversia BSL, fork ufficiale\n  CNCF/Linux Foundation (settembre 2023), GA\
    \ v1.6 (gennaio 2024)\n- **Compatibilità**: OpenTofu è drop-in replacement per Terraform fino a v1.5.x,\n  nessuna modifica\
    \ ai `.tf` esistenti per la migrazione base\n- **Differenze chiave rispetto a Terraform**:\n  - Provider registry: `registry.opentofu.org`\
    \ invece di `registry.terraform.io`\n    (anche Terraform registry funziona, ma OpenTofu ha il proprio)\n  - State encryption\
    \ nativa (feature non presente in Terraform): protegge\n    lo state file con AES-GCM o PBKDF2\n  - `provider_meta` esteso\n\
    \  - Loops e iterazioni più potenti (early evaluation)\n- **Migrazione da Terraform**:\n```bash\n# Installa OpenTofu\n\
    brew install opentofu   # macOS\n# oppure\nwget https://github.com/opentofu/opentofu/releases/download/v1.8.0/tofu_1.8.0_linux_amd64.zip\n\
    \n# Verifica compatibilità\ntofu version\n# Rimpiazza il binario terraform con tofu (alias o PATH)\nalias terraform=tofu\n\
    \n# Migrazione state: nessuna azione necessaria per state locali\n# Per backend remoto: aggiorna terraform_backend se\
    \ usi Terraform Cloud\n# (OpenTofu supporta solo backend open: S3, GCS, Azure Blob, Consul, etc.)\n```\n- **State encryption**\
    \ (feature esclusiva):\n```hcl\nterraform {\n  encryption {\n    key_provider \"pbkdf2\" \"my_passphrase\" {\n      passphrase\
    \ = var.state_passphrase\n    }\n    method \"aes_gcm\" \"my_method\" {\n      keys = key_provider.pbkdf2.my_passphrase\n\
    \    }\n    state {\n      method = method.aes_gcm.my_method\n      enforced = true\n    }\n  }\n}\n```\n- **Quando scegliere\
    \ OpenTofu vs Terraform**: tabella decisionale basata su\n  licensing constraints, Terraform Cloud dependency, compliance\
    \ requirements\n- **CI/CD con OpenTofu**: GitHub Actions (setup-opentofu action), GitLab CI\n- **Tooling compatibile**:\
    \ Atlantis, Terragrunt, Infracost — tutti supportano OpenTofu\n"
  proposal_id: prop-025
- id: '464'
  type: new_topic
  path: docs/monitoring/tools/prometheus-scalabilita.md
  category: monitoring
  priority: P1
  status: completed
  reason: "Creare guida sulla scalabilità di Prometheus oltre il singolo nodo/cluster.\nmonitoring/tools/prometheus.md copre\
    \ la configurazione base, ma non affronta\nil problema reale di chi ha 10+ cluster o retention >15 giorni: Prometheus\
    \ single\nnode non scala. I due approcci dominanti sono Thanos e VictoriaMetrics.\n\nStruttura suggerita:\n- **Perché\
    \ Prometheus da solo non basta**: limiti reali (RAM per alta cardinality,\n  storage locale, no HA nativa, no query cross-cluster)\n\
    - **Thanos**: architettura a componenti (Sidecar, Query, Store, Compactor, Ruler)\n```\n[Prometheus + Sidecar] → [Object\
    \ Store: S3/GCS/Azure Blob]\n       ↑                              ↑\n[Thanos Query] ← ← ← ← ← [Thanos Store Gateway]\n\
    \       ↓\n[Thanos Compactor] (dedup + downsampling)\n```\n- **Installazione Thanos Sidecar** (pattern più comune):\n\
    ```yaml\n# prometheus.yaml aggiunta\ncontainers:\n  - name: thanos-sidecar\n    image: quay.io/thanos/thanos:v0.36.0\n\
    \    args:\n      - sidecar\n      - --tsdb.path=/prometheus\n      - --prometheus.url=http://localhost:9090\n      -\
    \ --objstore.config-file=/etc/thanos/objstore.yaml\n```\n- **VictoriaMetrics**: alternativa drop-in, singolo binario,\
    \ 7-10x più efficiente\n  in storage rispetto a Prometheus, compatibile con PromQL e remote_write\n```bash\n# Single-node\
    \ VictoriaMetrics (replace Prometheus per cluster singolo)\ndocker run -v /path/to/storage:/victoria-metrics-data \\\n\
    \  victoriametrics/victoria-metrics:v1.101.0 \\\n  -storageDataPath=/victoria-metrics-data \\\n  -retentionPeriod=1y \
    \  # retention annuale senza problemi\n\n# Scrape config invariata rispetto a Prometheus\n# remote_write da Prometheus\
    \ a VictoriaMetrics\nremote_write:\n  - url: http://victoriametrics:8428/api/v1/write\n```\n- **Confronto Thanos vs VictoriaMetrics**:\
    \ tabella (complessità, HA, multi-tenancy,\n  cardinality, compatibilità Grafana, licensing)\n- **VictoriaMetrics Cluster**:\
    \ per multi-tenant o volume estremo\n- **Grafana Mimir** (menzione): terza opzione cloud-native di Grafana Labs\n- **Quando\
    \ usare cosa**: decision tree basato su numero cluster, retention, budget ops\n- **Remote write tuning**: come configurare\
    \ Prometheus per remote_write senza\n  perdere campioni sotto carico\n"
  proposal_id: prop-026
- id: '465'
  type: new_topic
  path: docs/cloud/gcp/storage/cloud-storage.md
  category: cloud
  priority: P2
  status: completed
  reason: "Creare guida su GCP Cloud Storage, il servizio di object storage di GCP.\nLa sezione cloud/gcp ha GKE, BigQuery,\
    \ Cloud Run e Pub/Sub ma nessun file\nsu Cloud Storage — servizio fondamentale usato come backend per quasi ogni\nworkload\
    \ GCP (Terraform state, log export, backup, data lake, ML datasets).\n\nStruttura suggerita:\n- **Panoramica**: bucket,\
    \ oggetti, URL (`gs://`), classi di storage\n- **Storage classes**: Standard, Nearline (>30gg), Coldline (>90gg), Archive\
    \ (>365gg)\n  con confronto costi e retrieval latency — tabella con use case\n- **IAM e accesso**: uniform bucket-level\
    \ access (raccomandato) vs legacy ACL,\n  service account con ruoli `storage.objectViewer`, `storage.objectCreator`\n\
    - **Comandi gsutil/gcloud**:\n```bash\n# Crea bucket con storage class e location\ngcloud storage buckets create gs://my-bucket\
    \ \\\n  --location=europe-west1 \\\n  --default-storage-class=STANDARD \\\n  --uniform-bucket-level-access\n\n# Upload/download\n\
    gcloud storage cp ./file.txt gs://my-bucket/path/\ngcloud storage rsync -r ./local-dir gs://my-bucket/backup/\n\n# Lifecycle\
    \ management (auto-delete/transition)\ngcloud storage buckets update gs://my-bucket \\\n  --lifecycle-file=lifecycle.json\n\
    ```\n- **Lifecycle policies**: transition automatica tra storage class, delete automatico\n  dopo N giorni — JSON config\
    \ con esempi\n- **Versioning**: enable/disable, recupero versioni precedenti\n- **Terraform state backend**:\n```hcl\n\
    terraform {\n  backend \"gcs\" {\n    bucket = \"my-tf-state\"\n    prefix = \"terraform/state\"\n  }\n}\n```\n- **Accesso\
    \ da Kubernetes (Workload Identity)**: come montare credenziali GCS\n  in pod GKE senza service account key file — pattern\
    \ raccomandato\n- **Integrazione con altri servizi GCP**: BigQuery external tables da GCS,\n  Cloud Functions trigger\
    \ su nuovi oggetti, Cloud Logging export\n- **Confronto con AWS S3**: mapping concettuale (bucket=bucket, object=object,\n\
    \  gsutil=aws s3 cp) per chi conosce S3\n"
  proposal_id: prop-027
- id: '466'
  type: new_topic
  path: docs/ci-cd/testing/performance-testing.md
  category: ci-cd
  priority: P2
  status: completed
  reason: "Creare guida sul performance/load testing automatizzato integrato in pipeline CI/CD.\nci-cd/testing ha test-strategy.md\
    \ (piramide dei test, unit/integration/e2e) e\ncontract-testing.md ma nessuna copertura del performance testing — gap\n\
    nella piramide: un DevOps che legge test-strategy.md trova raccomandazione\ndi \"aggiungere load test\" senza guida su\
    \ come farlo.\n\nStruttura suggerita:\n- **Tipi di test**: load test, stress test, soak test, spike test — definizioni\n\
    \  operative con quando usarli (non solo accademia)\n- **k6** (strumento principale — Go, scripting JavaScript, CLI-friendly\
    \ per CI):\n```javascript\n// script.js\nimport http from 'k6/http';\nimport { check, sleep } from 'k6';\n\nexport const\
    \ options = {\n  stages: [\n    { duration: '2m', target: 100 },   // ramp-up\n    { duration: '5m', target: 100 },  \
    \ // steady state\n    { duration: '2m', target: 0 },     // ramp-down\n  ],\n  thresholds: {\n    http_req_duration:\
    \ ['p(95)<500'],   // 95% < 500ms\n    http_req_failed: ['rate<0.01'],     // <1% errori\n  },\n};\n\nexport default function\
    \ () {\n  const res = http.get('https://api.example.com/users');\n  check(res, { 'status 200': (r) => r.status === 200\
    \ });\n  sleep(1);\n}\n```\n- **k6 in GitHub Actions**:\n```yaml\n- name: Run k6 load test\n  uses: grafana/k6-action@v0.3.0\n\
    \  with:\n    filename: tests/performance/load-test.js\n    flags: --out json=results.json\n- name: Check thresholds\n\
    \  run: |\n    # k6 exit code 99 se thresholds falliti\n    # Il job GitHub Actions fallisce automaticamente\n```\n- **Gatling**\
    \ (alternativa JVM — report HTML, DSL Scala/Java): quando preferirlo\n  (ambienti enterprise Java, report più ricchi)\n\
    - **Metriche chiave**: p50/p95/p99 latency, throughput (req/s), error rate,\n  concurrent users — come leggere i risultati\n\
    - **Baseline e regressione**: come salvare baseline, confrontare run successivi,\n  fail automatico su regressione >10%\n\
    - **Ambienti isolati**: perché NON fare load test su produzione, come configurare\n  un ambiente staging rappresentativo\n\
    - **Anti-pattern**: test da laptop (rete non controllata), test senza warm-up,\n  interpretare p99 senza guardare p95\n\
    - **Grafana k6 Cloud** (menzione): per test distribuiti da multiple location\n"
  proposal_id: prop-028
