site_name: DevOps Knowledge Base
site_description: Documentazione DevOps scalabile, organizzata e moderna
site_url: ""
repo_url: ""  # Inserire URL del repository GitHub
repo_name: ""

# Theme Configuration
theme:
  name: material
  language: it
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Passa al tema scuro
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Passa al tema chiaro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    # Navigation
    - navigation.instant          # Caricamento istantaneo (SPA-like)
    - navigation.instant.progress # Barra di progresso caricamento
    - navigation.tracking         # URL tracking automatico
    - navigation.tabs             # Tab di navigazione top-level
    - navigation.tabs.sticky      # Tab sempre visibili allo scroll
    - navigation.sections         # Sezioni espandibili nella sidebar
    - navigation.expand           # Espansione automatica sezioni
    - navigation.path             # Breadcrumb path
    - navigation.top              # Bottone "torna su"
    - navigation.indexes          # _index.md come landing page di sezione
    # Search
    - search.suggest              # Suggerimenti di ricerca
    - search.highlight            # Evidenziazione risultati
    - search.share                # Link condivisibili per ricerche
    # Content
    - content.code.copy           # Bottone copia su code blocks
    - content.code.annotate       # Annotazioni inline nel codice
    - content.tabs.link           # Tab sincronizzati
    - content.tooltips            # Tooltip avanzati
    # Header
    - header.autohide             # Header che si nasconde allo scroll
    # Table of contents
    - toc.follow                  # TOC segue lo scroll
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      warning: octicons/alert-16
      tip: octicons/flame-16
      example: octicons/code-16
      info: octicons/info-16

# Exclude internal reference files from build
exclude_docs: |
  _templates/
  _metadata/

# Plugins
plugins:
  - search:
      lang: 
        - it
        - en
      separator: '[\s\-\.]+'
  - tags:
      tags_file: tags.md
  - awesome-pages          # Navigazione automatica dalle cartelle

# Markdown Extensions
markdown_extensions:
  # Admonitions (note, warning, tip, collapsibili)
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # Tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Task lists, emoji, keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  # Typography
  - pymdownx.mark           # ==evidenziato==
  - pymdownx.caret          # ^^inserito^^
  - pymdownx.tilde          # ~~cancellato~~
  - pymdownx.smartsymbols
  # Tables
  - tables
  - pymdownx.superfences
  # Table of contents
  - toc:
      permalink: true
      toc_depth: 3
  # Abbreviations & glossary
  - abbr
  - attr_list
  - md_in_html
  - def_list
  # Footnotes
  - footnotes

# Extra CSS
extra_css:
  - assets/styles/custom.css

# Extra JS
extra_javascript:
  - assets/js/nav-enhance.js

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: ""  # Inserire URL profilo GitHub
  generator: false  # Rimuove "Made with MkDocs"
  status:
    new: Nuovo
    deprecated: Deprecato
